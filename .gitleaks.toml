[extend]
useDefault = true

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-api[0-9]{2}-[A-Za-z0-9_\-]{93}AA'''
tags = ["anthropic", "ai", "key"]

[[rules]]
id = "firecrawl-api-key"
description = "Firecrawl API Key"
regex = '''fc-[a-f0-9]{32}'''
tags = ["firecrawl", "key"]

[[rules]]
id = "issuer-priv-key"
description = "zk-hires Issuer Private Key (64-char hex)"
regex = '''ISSUER_PRIV_KEY=[a-f0-9]{64}'''
tags = ["zk-hires", "privkey"]

[allowlist]
paths = [".env.example"]
